<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <title>Grudge Studios — Server Lobby</title>
  <meta name="description" content="Grudge Studios Server Lobby — Choose your battlefield. Souls-like MMO Minecraft, browser RPG, dungeon crawlers, crafting, and more.">
  <meta property="og:title" content="Grudge Studios — Server Lobby">
  <meta property="og:description" content="Central hub for all Grudge Studio games. Join Grudge Factions, Grudge Warlords, Dungeon Crawler Quest, and more.">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://js.puter.com/v2/"></script>
</head>
<body>
  <!-- Particles -->
  <div class="particles" id="particles"></div>

  <!-- Top Bar -->
  <nav class="top-bar">
    <div class="top-bar-brand">GRUDGE <span>STUDIOS</span></div>
    <div class="auth-controls" id="authControls">
      <button class="auth-btn login" id="loginBtn" onclick="showAuthModal()">Sign In</button>
    </div>
  </nav>

  <!-- Auth Modal -->
  <div class="auth-overlay hidden" id="authOverlay">
    <div class="auth-modal">
      <button class="auth-close" onclick="hideAuthModal()">&times;</button>
      <h2>Enter the Arena</h2>
      <p>Sign in to sync progress across all Grudge games</p>
      <button class="auth-modal-btn grudge" onclick="authGrudgeLogin()">Sign In with Grudge</button>
      <button class="auth-modal-btn discord" onclick="authDiscord()">Continue with Discord</button>
      <div class="auth-divider"><span>or</span></div>
      <button class="auth-modal-btn guest-btn" onclick="authGuest()">Play as Guest</button>
    </div>
  </div>

  <!-- Hero -->
  <header class="hero">
    <div class="hero-glow"></div>
    <h1 class="hero-title">GRUDGE <span class="gold">STUDIOS</span></h1>
    <p class="hero-subtitle">Choose Your Battlefield</p>
    <div class="hero-stats">
      <div class="hero-stat">
        <div class="hero-stat-value" id="totalGames">6</div>
        <div class="hero-stat-label">Game Servers</div>
      </div>
      <div class="hero-stat">
        <div class="hero-stat-value" id="mcPlayers">—</div>
        <div class="hero-stat-label">MC Online</div>
      </div>
      <div class="hero-stat">
        <div class="hero-stat-value">4</div>
        <div class="hero-stat-label">Classes</div>
      </div>
      <div class="hero-stat">
        <div class="hero-stat-value">120</div>
        <div class="hero-stat-label">Mods</div>
      </div>
    </div>
  </header>

  <!-- Game Server Grid -->
  <section class="lobby-section">
    <h2 class="lobby-heading">Game Servers</h2>
    <div class="game-grid" id="gameGrid"></div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <p>&copy; 2026 Grudge Studios &mdash; Created by Racalvin The Pirate King</p>
  </footer>

  <script src="/grudge-sdk.js"></script>
  <script src="/script.js"></script>
</body>
</html>
