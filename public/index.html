<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grudge Studios &mdash; Server Lobby</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Roboto:wght@300;400;500;600&display=swap">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <!-- Full-page video background -->
  <video id="hero-video" autoplay muted loop playsinline preload="auto">
    <source src="/hero-scroll.mp4" type="video/mp4">
  </video>

  <div class="particles" id="particles"></div>

  <header class="top-bar">
    <span class="top-bar-brand">GRUDGE <span>STUDIOS</span></span>
    <div class="auth-controls" id="auth-controls">
      <button class="auth-btn login" id="login-btn">Sign In</button>
    </div>
  </header>

  <div class="auth-overlay hidden" id="auth-overlay">
    <div class="auth-modal">
      <button class="auth-close" id="auth-close">&times;</button>
      <h2>Enter the Arena</h2>
      <p>Sign in to sync progress across all Grudge games</p>
      <button class="auth-modal-btn grudge" id="grudge-login-btn">Sign In with Grudge</button>
      <button class="auth-modal-btn discord" id="discord-login-btn">Continue with Discord</button>
      <div class="auth-divider">or</div>
      <button class="auth-modal-btn guest-btn" id="guest-login-btn">Play as Guest</button>
    </div>
  </div>

  <main>
    <section class="hero">
      <div class="hero-glow"></div>
      <h1 class="hero-title">GRUDGE <span class="gold">STUDIOS</span></h1>
      <p class="hero-subtitle">Choose Your Battlefield</p>
      <div class="hero-stats">
        <div class="hero-stat">
          <div class="hero-stat-value" id="player-count">&ndash;</div>
          <div class="hero-stat-label">Players</div>
        </div>
        <div class="hero-stat">
          <div class="hero-stat-value">4</div>
          <div class="hero-stat-label">Classes</div>
        </div>
        <div class="hero-stat">
          <div class="hero-stat-value">17</div>
          <div class="hero-stat-label">Weapons</div>
        </div>
        <div class="hero-stat">
          <div class="hero-stat-value">5</div>
          <div class="hero-stat-label">Professions</div>
        </div>
      </div>
    </section>

    <section class="lobby-section">
      <h2 class="lobby-heading">Game Servers</h2>
      <div class="game-grid" id="game-grid"></div>
    </section>
  </main>

  <footer>
    <p style="text-align:center;color:var(--text-muted);font-size:.8rem;padding:2rem">
      &copy; 2026 Grudge Studios &mdash; Created by Racalvin The Pirate King
    </p>
  </footer>

  <script src="/grudge-sdk.js"></script>
  <script src="/script.js"></script>

</body>
</html>
